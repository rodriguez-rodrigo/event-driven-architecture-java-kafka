services:
  pgsql:
    image: 'postgres:18-alpine'
    ports:
      - '5432:5432'
    environment:
      PGPASSWORD: 'password'
      POSTGRES_DB: 'java'
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'password'
    volumes:
      - 'java-pgsql:/var/lib/postgresql'
    networks:
      - java

  adminer:
    image: 'adminer:latest'
    ports:
      - '8090:8080'
    environment:
      ADMINER_DEFAULT_SERVER: pgsql
    networks:
      - java

networks:
  java:
    driver: bridge

volumes:
  java-pgsql:
    driver: local